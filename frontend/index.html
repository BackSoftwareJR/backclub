<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Preconnect API: prima richiesta più veloce -->
    <link rel="dns-prefetch" href="https://backclub.it" />
    <link rel="preconnect" href="https://backclub.it" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>frontend</title>
    <script>
      // Apply theme immediately before React loads to prevent flash
      (function() {
        const getSystemTheme = () => {
          return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };
        
        const resolveTheme = (theme) => {
          if (theme === 'system') {
            return getSystemTheme();
          }
          return theme;
        };
        
        const savedTheme = localStorage.getItem('preferred_theme') || 'system';
        const resolved = resolveTheme(savedTheme);
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
